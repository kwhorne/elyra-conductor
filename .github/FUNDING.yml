Elyra Conductor is free and open source.
We like it that way.

It means Elyra Conductor belongs to the community and can stay focused on real developers building real applications.

But keeping Elyra Conductor healthy takes real work.

Today, Elyra Conductor is maintained by a small team working on the project nearly full time: fixing bugs, reviewing pull requests, answering issues, writing docs, maintaining the ecosystem, and continuing to ask:

What is currently painful or complicated about web development, and how can we compress it into a single line of code?

Elyra Conductor exists to help users do more with less:


If Elyra Conductor has helped you, your team, or your business, please consider sponsoring the project.

Your sponsorship gives us the time and focus to keep Elyra Confuctor strong, stable, and moving forward.

Thank you for helping us continue this work.

